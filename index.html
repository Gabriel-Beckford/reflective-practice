<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kolb Reflective Cycle — Main Deck Shell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <div class="header-label">Kolb Deck</div>
      <div class="header-section" id="header-section">Section 1</div>
    </div>
    <div class="header-section" id="header-slide-id">1.1</div>
    <div class="api-config" aria-label="Gemini API key configuration">
      <label for="api-key-input">Gemini API key</label>
      <input
        id="api-key-input"
        type="password"
        placeholder="Paste API key"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="save-api-key" type="button">Save</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </header>

  <main>
    <div id="slide-container"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
