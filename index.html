<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflective Practice</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- Material Web -->
    <script type="module" src="https://esm.run/@material/web/all.js"></script>

    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#app-main">Skip to main content</a>

    <main id="app-main" aria-label="Reflective practice application" class="app-shell reveal" role="main">
      <section aria-labelledby="app-title" class="hero-section reveal reveal-delay-1">
        <h1 id="app-title">Reflective Practice</h1>
        <p id="app-description">A mobile-first single-page scaffold for guided reflection.</p>
      </section>

      <section
        id="slide-region"
        class="slide-container reveal reveal-delay-2"
        aria-labelledby="slide-title"
        aria-describedby="slide-instructions"
        aria-live="polite"
      >
        <h2 id="slide-title">Welcome</h2>
        <p id="slide-instructions">Use the navigation controls to move through the reflection slides.</p>
        <div id="slide-content" role="region" aria-label="Current slide content"></div>
      </section>

      <nav class="app-nav reveal reveal-delay-3" aria-label="Slide navigation controls">
        <button id="prev-button" type="button" class="touch-target" aria-label="Go to previous slide">Previous</button>
        <button id="next-button" type="button" class="touch-target" aria-label="Go to next slide">Next</button>
      </nav>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
