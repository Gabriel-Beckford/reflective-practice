<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kolb Reflective Cycle Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="menu-overlay" id="menu-overlay" hidden></div>

    <header>
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="section-menu" aria-label="Open section menu">
          ☰
        </button>
        <span class="header-label">Kolb's Reflective Cycle</span>
        <span class="header-section" id="section-label">Section</span>
      </div>
      <div class="slide-counter" id="slide-counter">Slide 1 of 1</div>
      <a class="storyboard-link" href="./storyboard-grid.html">Storyboard Grid</a>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </header>

    <aside class="section-menu" id="section-menu" aria-label="Section navigation" hidden>
      <div class="section-menu-head">
        <h2>Sections</h2>
        <button class="menu-close" id="menu-close" type="button" aria-label="Close section menu">✕</button>
      </div>
      <nav id="section-nav"></nav>
    </aside>

    <div class="avatar-shell idle" id="avatar-shell" aria-live="polite">
      <div class="avatar-face" aria-hidden="true"></div>
      <p class="avatar-status" id="avatar-status">Avatar is idle.</p>
      <p class="thinking-indicator" id="thinking-indicator" hidden>thinking...</p>
    </div>

    <main>
      <div class="connection-status" id="connection-status" role="status" aria-live="polite">AI connection required before progression.</div>
      <div id="slide-container" aria-live="polite"></div>
    </main>

    <footer>
      <button class="nav-btn" id="prev-btn" type="button">Previous</button>
      <div class="slide-count" id="slide-id">Slide</div>
      <button class="nav-btn primary" id="next-btn" type="button">Next</button>
    </footer>

    <div class="api-gate" id="api-gate" role="dialog" aria-modal="true" aria-labelledby="api-gate-title">
      <div class="api-gate-panel">
        <h2 id="api-gate-title">Connect your AI workspace</h2>
        <p>This deck uses a server-managed <code>GEMINI_API_KEY</code>. Test connectivity through the local proxy to continue.</p>
        <label for="api-key-input">Connection check</label>
        <input id="api-key-input" type="text" placeholder="No key needed in browser" value="server-managed key" readonly aria-readonly="true" />
        <div class="api-gate-actions">
          <button id="api-test-btn" type="button" class="nav-btn primary">Test Connection</button>
        </div>
        <p class="api-gate-status" id="api-gate-status">Not connected.</p>
      </div>
    </div>

    <script src="deck-data.js"></script>
    <script src="pdf-export.js"></script>
    <script src="js/interactions/drag-drop.js"></script>
    <script src="js/interactions/linking.js"></script>
    <script src="js/interactions/pelmanism.js"></script>
    <script src="js/interactions/table-completion.js"></script>
    <script src="js/interactions/short-answer.js"></script>
    <script src="js/interactions/gapfill.js"></script>
    <script src="js/interactions/matrix.js"></script>
    <script src="js/interactions/accordion.js"></script>
    <script src="js/interactions/quote-card.js"></script>
    <script src="js/interactions/interactive-diagram.js"></script>
    <script src="js/interactions/padlet-embed.js"></script>
    <script src="js/interactions/ai-chat.js"></script>
    <script src="js/interactions/chatbot-route.js"></script>
    <script src="js/interactions/pond-game.js"></script>
    <script src="js/interactions/rubric-grade.js"></script>
    <script src="deck.js"></script>
  </body>
</html>
