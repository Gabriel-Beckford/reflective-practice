<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kolb Deck Storyboard Grid</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6fb;
        --card: #ffffff;
        --text: #1f2330;
        --muted: #606a80;
        --line: #dbe0ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "DM Sans", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(246, 246, 251, 0.96);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--line);
        padding: 14px 20px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.1rem, 1rem + 1vw, 1.6rem);
      }
      .meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.92rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 14px;
        padding: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(15, 19, 35, 0.06);
      }
      .viewport {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #fff;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .caption {
        padding: 10px 12px 12px;
      }
      .badge {
        display: inline-block;
        font-size: 0.72rem;
        line-height: 1.2;
        background: #eef1fc;
        color: #3a4666;
        border-radius: 999px;
        padding: 5px 9px;
        margin-bottom: 8px;
      }
      .title {
        margin: 0;
        font-size: 0.96rem;
        line-height: 1.38;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Kolb Reflective Cycle — Complete Storyboard Grid</h1>
      <div class="meta" id="meta">Loading slides…</div>
    </header>

    <main class="grid" id="grid"></main>

    <script src="deck-data.js"></script>
    <script>
      const deck = window.DECK_DATA || { slides: [] };
      const slides = Array.isArray(deck.slides) ? deck.slides : [];
      const grid = document.getElementById("grid");
      const meta = document.getElementById("meta");

      meta.textContent = `${slides.length} slides rendered in a responsive image grid.`;

      slides.forEach((slide, index) => {
        const card = document.createElement("article");
        card.className = "card";

        const viewport = document.createElement("div");
        viewport.className = "viewport";

        const frame = document.createElement("iframe");
        frame.loading = "lazy";
        frame.title = slide.badge || `Slide ${index + 1}`;
        frame.src = `./index.html?slide=${index + 1}&storyboard=1`;

        viewport.appendChild(frame);

        const caption = document.createElement("div");
        caption.className = "caption";

        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = slide.badge || `Slide ${index + 1}`;

        const title = document.createElement("p");
        title.className = "title";
        title.textContent = slide.title || "Untitled slide";

        caption.append(badge, title);
        card.append(viewport, caption);
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
