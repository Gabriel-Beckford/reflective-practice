<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micro-Reflection Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .chatbot-main {
        width: min(960px, 100%);
        margin: 0 auto;
      }

      .chatbot-card {
        width: 100%;
        background: linear-gradient(180deg, var(--md-surface-bright) 0%, var(--md-surface) 100%);
        border-radius: var(--radius-lg);
        border: 1px solid var(--md-outline-variant);
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .chatbot-title {
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(1.65rem, 2.8vw, 2.2rem);
      }

      .chatbot-subtitle,
      .chatbot-hint {
        color: var(--md-on-surface-variant);
      }

      .mode-options {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .mode-pill {
        border: 1px solid var(--md-outline-variant);
        background: var(--md-surface-high);
        color: var(--md-on-surface);
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
      }

      .mode-pill.active {
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
        border-color: var(--md-primary);
      }

      .phase-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .phase-chip {
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        font-weight: 700;
        border: 1px solid var(--md-outline-variant);
        background: var(--md-surface-high);
        color: var(--md-on-surface-variant);
      }

      .phase-chip.active {
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
        border-color: var(--md-primary);
      }

      .phase-chip.done {
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
        border-color: var(--md-secondary);
      }

      .question-box {
        border: 1px solid var(--md-outline-variant);
        border-radius: var(--radius-md);
        padding: 16px;
        background: var(--md-surface-container);
      }

      .transcript {
        display: grid;
        gap: 10px;
      }

      .transcript-item {
        border-left: 4px solid var(--md-primary-dim);
        padding-left: 10px;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        border: 1px solid var(--md-outline-variant);
        border-radius: var(--radius-sm);
        padding: 12px;
        font-family: inherit;
        font-size: 1rem;
        line-height: 1.5;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: 1px solid var(--md-outline-variant);
        background: var(--md-surface);
        color: var(--md-on-surface);
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .btn.primary {
        background: var(--md-primary);
        color: var(--md-on-primary);
        border-color: transparent;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .summary-card {
        border: 1px solid var(--md-outline-variant);
        border-radius: var(--radius-md);
        padding: 14px;
        background: var(--md-surface-container);
      }

      .share-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      @media (max-width: 720px) {
        .chatbot-card {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="chatbot-main chatbot-card" id="chatbot-root" aria-live="polite"></section>
    </main>

    <script src="pdf-export.js"></script>
    <script src="chatbot.js"></script>
  </body>
</html>
